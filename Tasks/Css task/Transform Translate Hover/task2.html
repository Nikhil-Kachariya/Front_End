<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .item {
            overflow: hidden;
            width: 400px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            height: 270px;
        }

        img {
            transition: 0.3s all ease;
        }

        .item:hover img {
            transform: scale(1.3);
        }

        .item a {
            display: block;
        }

        .item a::before {
            content: '';
            background: linear-gradient(rgba(0, 0, 0, .4));

        }

        .item img {
            width: 100%;
        }

        .item .content {
            transform: translate(0, -100%);
            display: flex;
            flex-direction: column;
            padding: 96px 60px;
            background: linear-gradient(rgba(0, 0, 0, 0.5));
        }

        .item .content span.brand {
            color: #ff6700;
            font-size: 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .item .content h2 {
            margin: 10px 0;
        }

        .item .content h2 a {
            text-decoration: none;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item">
            <a href="#">
                <img src="1.jpeg" alt="image">
            </a>
            <div class="content">
                <span class="brand">Brand</span>
                <h2><a href="#">Plugging ideas to your </a></h2>
            </div>
        </div>
    </div>

</body>

</html>
