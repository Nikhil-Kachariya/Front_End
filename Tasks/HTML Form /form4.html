<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Admission Form</h1>
    <div>Enter your admission information below:</div>
    <hr>
<table cellspacing="10">
    <form action="">
        <tr>
            <td><label for=""><b>Name*</b></label></td>
        </tr>
        <tr>
            <td><input type="text" placeholder="First name" title="First name">
            <input type="text" placeholder="Middle name" title="Middle name">
            <input type="text" placeholder="Last name" title="Last name"></td>
        </tr>
        <tr>
            <td><label for=""><b>Birth Date*</b></label></td>
        </tr>
        <tr>
            <td><input type="date"></td>
        </tr>
        <tr>
            <td><label for=""><b>Gender*</b></label></td>
        </tr>
        <tr>
            <td>
                <input name="gender" type="radio">Male <br>
                <input name="gender" type="radio">Female <br>
                <input name="gender" type="radio">Decline to Answer
            </td>
        </tr>
        <tr>
            <td><label for=""><b>Are yiy Hispanic or Latino?*</b></label></td>
        </tr>
        <tr>
            <td>
                <input name="gender" type="radio">No <br>
                <input name="gender" type="radio">Yes<br>
                <input name="gender" type="radio">Decline to Answer
            </td>
        </tr>
        <tr>
            <td><input type="submit"></td>
        </tr>
    </form>
</table>
</body>
</html>
