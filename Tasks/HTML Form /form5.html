<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Membership Application</h2>
    <div>To apply for membership please complete all question</div>
    <hr>
    <table cellspacing="10">
        <form action="">
            <tr>
                <td><label for="">Name</label></td>
                <td><input type="text" placeholder="First name" title="First name">
                    <input type="text" placeholder="Last name" title="Last Name">
                </td>
            </tr>
            <tr>
                <td><label for="">Address</label></td>
                <td><input type="text" placeholder="Street Address" title="Street Address"><br>
                    <input type="text" placeholder="Street address Line 2"><br>
                    <input type="text" placeholder="City" title="city">
                    <input type="text" placeholder="State/Province" title="State/Province"><br>
                    <input type="tel" placeholder="Postal/Zip Code">
                    <select>
                        <option disabled value="">---select your country ----</option>
                        <option value="">India</option>
                        <option value="">USA</option>
                        <option value="">UAE</option>
                        <option value="">Canda</option>
                        <option value="">China</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="">E-mail</label></td>
                <td><input type="email" placeholder="Ex-myname@gmail.com" title="Email"></td>
            </tr>
            <tr>
                <td><label for="">Home number</label></td>
                <td><input type="tel" placeholder="Area code"></td>
                <td>-</td><td><input type="tel" placeholder="Phone Number"></td>
            </tr>
            <tr>
                <td><label for="">Cellular number</label></td>
                <td><input type="tel" placeholder="Area code"></td>
                <td>-</td><td><input type="tel" placeholder="Cellular Number"></td>
            </tr>
            <tr>
                <td><label for="">Work number</label></td>
                <td><input type="tel" placeholder="Area code"></td>
                <td>-</td><td><input type="tel" placeholder="Work Number"></td>
            </tr>
            <tr>
                <td><label for="">Website</label></td>
                <td><input type="url"></td>
            </tr>
            <tr>
                <td> <input type="submit"></td>
            </tr>
        </form>
    </table>
</body>

</html>
